name: perseus
description: >
  Perseus context engine — injects live Perseus context (health checks,
  @query directives, workspace status) at session start and delegates
  conversation compaction to the built-in ContextCompressor.  Provides
  perseus_grep and perseus_status tools to the agent.  Falls back
  gracefully when the Perseus plugin is not installed.
version: "1.0.0"
author: tcconnally
